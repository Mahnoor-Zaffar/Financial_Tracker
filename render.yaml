services:
  - type: web
    name: fintrack
    env: python
    plan: starter
    buildCommand: pip install -r requirements.txt
    preDeployCommand: flask db upgrade
    startCommand: gunicorn --bind 0.0.0.0:$PORT app:app
    envVars:
      - key: APP_ENV
        value: production
      - key: FLASK_ENV
        value: production
      - key: LOG_LEVEL
        value: INFO
      - key: SESSION_COOKIE_SECURE
        value: true
      - key: SECRET_KEY
        generateValue: true
      # Set DATABASE_URL from a managed PostgreSQL database in Render dashboard.
